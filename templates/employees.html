{% extends "base.html" %}

{% block content %}
<h2>社員管理</h2>
<hr>
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>社員一覧</h4>
    <a href="/employees/add" class="btn btn-primary">新規追加</a>
</div>
<div class="card">
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>社員名</th>
                    <th>ユーザー名</th>
                    <th>役職</th>
                    <th>時給</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.name }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.role }}</td>
                    <td>¥{{ user.hourly_wage }}</td>
                    <td>
                        <a href="/employees/edit/{{ user.id }}" class="btn btn-sm btn-outline-secondary">編集</a>
                        {% if user.id != session['user_id'] %}
                        <a href="/employees/delete/{{ user.id }}" class="btn btn-sm btn-outline-danger">削除</a>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
