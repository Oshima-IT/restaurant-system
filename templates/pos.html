{% extends "base.html" %}

{% block content %}

<h2>POSレジ</h2>

<hr>

<div class="card mb-4">
    <div class="card-body">
        <h4>レシート / 最終画面の読み取り</h4>
        <p class="text-muted">レシートやレジ最終画面の写真を撮って、売上・勤怠のデータとして取り込みます。最終画面に出る出勤・退勤時刻も自動で拾います。</p>

        <video id="video" width="100%" height="300" autoplay class="border rounded"></video>
        <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
        <img id="preview" class="img-fluid border rounded mt-3" style="max-width:640px;">

        <div class="mt-3">
            <button class="btn btn-success me-2" onclick="startCamera()">カメラ起動</button>
            <button class="btn btn-primary me-2" onclick="captureAndSubmit()">撮影して登録</button>
            <input type="file" id="imageFile" accept="image/*" style="display:none;">
            <button class="btn btn-info" onclick="document.getElementById('imageFile').click()">ファイルを選択</button>
        </div>

        <hr>
        <h5>読み取り結果の確認</h5>
        <div id="edit-section" class="bg-light p-3 rounded" style="display:none;">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="card border-primary">
                        <div class="card-header bg-primary text-white small py-1">売上データとして登録</div>
                        <div class="card-body p-3">
                            <label class="form-label small">合計金額 (¥)</label>
                            <input type="number" id="edit-total" class="form-control mb-2" value="0">
                            <button class="btn btn-primary w-100" onclick="submitFinalData('sale')">売上のみ登録</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border-success">
                        <div class="card-header bg-success text-white small py-1">勤怠データとして登録</div>
                        <div class="card-body p-3">
                            <div class="row g-2 mb-2">
                                <div class="col-6">
                                    <label class="form-label small">出勤</label>
                                    <input type="time" id="edit-clock-in" class="form-control form-control-sm">
                                </div>
                                <div class="col-6">
                                    <label class="form-label small">退勤</label>
                                    <input type="time" id="edit-clock-out" class="form-control form-control-sm">
                                </div>
                            </div>
                            <button class="btn btn-success w-100" onclick="submitFinalData('attendance')">勤怠のみ登録</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-3 text-center">
                <button class="btn btn-dark btn-sm px-4" onclick="submitFinalData('both')">売上と勤怠を同時に登録</button>
                <button class="btn btn-link btn-sm text-muted" onclick="resetForm()">キャンセル</button>
            </div>
        </div>
        <pre id="ocr-result" class="text-muted mt-2" style="font-size:0.8rem;"></pre>
    </div>
</div>

<script>
let stream;

async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
    } catch (error) {
        alert('カメラを起動できません。');
        console.error(error);
    }
}

function processOCRResult(result) {
    const text = result.text || '';
    document.getElementById('ocr-result').innerText = "OCR Raw Text:\n" + text;

    // 解析APIを叩く、または解析結果を反映
    fetch('/checkout_preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('edit-section').style.display = 'block';
        document.getElementById('edit-total').value = data.total_amount || 0;
        document.getElementById('edit-clock-in').value = data.clock_in || '';
        document.getElementById('edit-clock-out').value = data.clock_out || '';
        
        // 画面下部へスクロール
        document.getElementById('edit-section').scrollIntoView({ behavior: 'smooth' });
    });
}

function submitFinalData(mode) {
    const total = document.getElementById('edit-total').value;
    const clock_in = document.getElementById('edit-clock-in').value;
    const clock_out = document.getElementById('edit-clock-out').value;
    const raw_text = document.getElementById('ocr-result').innerText;

    const payload = {
        mode: mode, // 'sale', 'attendance', 'both'
        total: total,
        clock_in: clock_in,
        clock_out: clock_out,
        text: raw_text
    };

    fetch('/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('登録が完了しました。');
            window.location.href = mode === 'attendance' ? '/attendance' : '/sales';
        } else {
            alert('登録に失敗しました。');
        }
    });
}

function resetForm() {
    document.getElementById('edit-section').style.display = 'none';
    document.getElementById('preview').src = '';
}

function captureAndSubmit() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d');
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    const image = canvas.toDataURL('image/png');
    document.getElementById('preview').src = image;

    fetch('/upload_purchase_image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: image })
    })
    .then(response => response.json())
    .then(data => {
        if (!data.success) return alert('画像保存失敗');
        return fetch('/ocr_purchase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: data.filename })
        });
    })
    .then(response => response.json())
    .then(result => processOCRResult(result))
    .catch(err => alert('エラーが発生しました'));
}

document.getElementById('imageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    const reader = new FileReader();
    reader.onload = (ev) => document.getElementById('preview').src = ev.target.result;
    reader.readAsDataURL(file);

    fetch('/upload_purchase_image', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
        return fetch('/ocr_purchase', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: data.filename })
        });
    })
    .then(res => res.json())
    .then(result => processOCRResult(result))
    .catch(err => alert('エラーが発生しました'));
});
</script>

{% endblock %}
